{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 时令通讯进货单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        body {
            background-color: #F3F4F6;
        }
        /* 侧边栏 - 桌面端 */
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1F2937 0%, #111827 100%);
        }
        .sidebar .nav-link {
            color: #9CA3AF;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 4px 12px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: rgba(79, 70, 229, 0.2);
            color: #fff;
        }
        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
            color: white;
            border-radius: 12px;
        }
        /* 手机端顶部导航 */
        .mobile-header {
            display: none;
            background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
            color: white;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #E5E7EB;
            padding: 8px 0;
            z-index: 100;
        }
        .mobile-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #6B7280;
            text-decoration: none;
            font-size: 12px;
            padding: 4px;
        }
        .mobile-nav a.active {
            color: var(--primary);
        }
        .mobile-nav i {
            font-size: 20px;
        }
        /* 手机端适配 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .mobile-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .mobile-header .store-name-pc {
                display: none;
            }
            .mobile-nav {
                display: flex;
                justify-content: space-around;
            }
            main {
                padding-bottom: 80px !important;
            }
        }
        @media (min-width: 769px) {
            .mobile-header .store-name-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 手机端顶部导航 -->
    <div class="mobile-header">
        <div>
            <i class="bi bi-box-seam"></i> 时令通讯进货单
        </div>
        <div class="small store-name-mobile">{{ store.name }}</div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse show">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h5 class="text-white">
                            <i class="bi bi-box-seam"></i> 时令通讯进货单
                        </h5>
                        <p class="text-white store-name-pc">{{ store.name }}</p>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'clerk_dashboard' %}">
                                <i class="bi bi-house"></i> 工作台
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'clerk_create_purchase' %}">
                                <i class="bi bi-cart-plus"></i> 创建进货单
                            </a>
                        </li>
                    </ul>
                    <div class="mt-4 px-3">
                        <a href="{% url 'clerk_logout' %}" class="btn btn-outline-light btn-sm w-100">
                            <i class="bi bi-box-arrow-right"></i> 退出登录
                        </a>
                    </div>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">工作台</h4>
                </div>

                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <!-- Quick Actions -->
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-body text-center py-5">
                                <i class="bi bi-cart-plus text-primary fs-1"></i>
                                <h5 class="mt-3">创建进货单</h5>
                                <a href="{% url 'clerk_create_purchase' %}" class="btn btn-primary">立即创建</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="mb-3">使用说明</h5>
                                <ol class="small text-muted">
                                    <li>搜索商品（支持条码/名称）</li>
                                    <li>填写进货数量</li>
                                    <li>提交进货单</li>
                                </ol>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 手机端底部导航 -->
    <div class="mobile-nav">
        <a href="{% url 'clerk_dashboard' %}" class="active">
            <i class="bi bi-house"></i>
            <span>工作台</span>
        </a>
        <a href="{% url 'clerk_create_purchase' %}">
            <i class="bi bi-cart-plus"></i>
            <span>进货单</span>
        </a>
        <a href="{% url 'clerk_logout' %}">
            <i class="bi bi-box-arrow-right"></i>
            <span>退出</span>
        </a>
    </div>
</body>
</html>
